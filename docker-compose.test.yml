services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8787:8787"
    env_file:
      - .env.test
    environment:
      PORT: 8787
      HOST: 0.0.0.0
      HTTPS_PORT: 0
      MYSQL_HOST: mysql
      FFMPEG_PATH: /usr/bin/ffmpeg
      FFPROBE_PATH: /usr/bin/ffprobe
    volumes:
      - test-app-logs:/app/logs
      - test-app-storage:/app/server/storage
    restart: unless-stopped  

  nginx:
    build:
      context: ./client
      dockerfile: Dockerfile.test
    ports:
      - "7000:443"
    depends_on:
      - app
    volumes:
      - ./client/dist:/usr/share/nginx/html
      - ./client/ssl:/etc/nginx/ssl
    restart: unless-stopped
    
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wecom_recorder_test}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  test-app-logs:
  test-app-storage:
  mysql-data:
