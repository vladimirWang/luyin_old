services:
  app:
    build:
      context: ./server
      dockerfile: Dockerfile
    expose:
      - "8787"
    env_file:
      - .env.test
    environment:
      PORT: 8787
      HOST: 0.0.0.0
      HTTPS_PORT: 0
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      FFMPEG_PATH: /usr/bin/ffmpeg
      FFPROBE_PATH: /usr/bin/ffprobe
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - test-app-logs:/app/logs
      - test-app-storage:/app/server/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 40s

  py_server:
    build:
      context: ./py_server
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file:
      - .env.test
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - /app/.venv/bin/python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    build:
      context: ./client
      dockerfile: Dockerfile.test
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    depends_on:
      app:
        condition: service_healthy
      py_server:
        condition: service_healthy
    volumes:
      - ./client/ssl:/etc/nginx/ssl:ro
      - test-app-storage:/app/server/storage:ro
      - ./client/dist:/usr/share/nginx/html
    restart: unless-stopped
    
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wecom_recorder_test}
    expose:
      - "3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  test-app-logs:
  test-app-storage:
  mysql-data:
