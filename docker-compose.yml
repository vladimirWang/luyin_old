services:
  app:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
      - "8787:8787"
    environment:
      PORT: 8787
      HOST: 0.0.0.0
      HTTPS_PORT: 0
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: wecom_recorder
      MYSQL_PASSWORD: wecom_recorder_pass
      MYSQL_DATABASE: wecom_recorder
      ACCOUNT_TOKEN_SECRET: dev-account-token-secret
      SESSION_SECRET: dev-session-secret
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: wecom_recorder
      MYSQL_USER: wecom_recorder
      MYSQL_PASSWORD: wecom_recorder_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -prootpass --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  mysql-data:
