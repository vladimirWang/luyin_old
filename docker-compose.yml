services:
  app:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
      - "7000:7000"
    env_file:
      - .env.dev
    environment:
      PORT: 7000
      HOST: 0.0.0.0
      HTTPS_PORT: 0
      MYSQL_HOST: host.docker.internal
    volumes:
      - .:/app
      - /app/node_modules
      - app-logs:/app/logs
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  app-logs:
