services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8787:8787"
      - "9229:9229"
    env_file:
      - .env.dev
    environment:
      PORT: 8787
      HOST: 0.0.0.0
      HTTPS_PORT: 0
      FFMPEG_PATH: /usr/bin/ffmpeg
      FFPROBE_PATH: /usr/bin/ffprobe
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["npx", "nodemon", "--inspect=0.0.0.0:9229", "server/index.mjs"]

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "7001:80"
    depends_on:
      - app
    restart: unless-stopped
    volumes:
      - ./client/dist:/usr/share/nginx/html
      - ./client/nginx.dev.conf:/etc/nginx/conf.d/default.conf

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wecom_recorder}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-123456}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD:-rootpass} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  mysql-data:
