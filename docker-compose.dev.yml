services:
  app:
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        INSTALL_DEV: "true"
    image: luyin-app:0.5.0
    ports:
      - "8787:8787"
      - "9229:9229"
    env_file:
      - .env.dev
    environment:
      PORT: 8787
      HOST: 0.0.0.0
      HTTPS_PORT: 0
      FFMPEG_PATH: /usr/bin/ffmpeg
      FFPROBE_PATH: /usr/bin/ffprobe
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["pnpm", "--dir", "server", "exec", "nodemon", "--inspect=0.0.0.0:9229", "index.mjs"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 600s
      timeout: 3s
      retries: 12
      start_period: 20s
    volumes:
      - ./server/logs:/app/logs
      - ./server/storage:/app/server/storage

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "7000:443"
    restart: unless-stopped
    volumes:
      - ./client/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./client/ssl:/etc/nginx/ssl:ro
      - ./client/dist:/usr/share/nginx/html:ro

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wecom_recorder2}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD:-rootpass} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  mysql-data:
  app-logs-dev:
  app-storage-dev:
