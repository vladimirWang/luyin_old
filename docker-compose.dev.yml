name: luyin-dev

services:
  app:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    image: wecom-recorder-app:dev
    env_file:
      - .env.dev
    environment:
      NODE_ENV: development
      PORT: 8787
      HOST: 0.0.0.0
      HTTPS_PORT: 0
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-wecom_recorder}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wecom_recorder_dev}
      DATABASE_URL: mysql://${MYSQL_USER:-wecom_recorder}:${MYSQL_PASSWORD:-123456}@mysql:3306/${MYSQL_DATABASE:-wecom_recorder_dev}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      PRISMA_SCHEMA_MODE: push
      FFMPEG_PATH: /usr/bin/ffmpeg
      FFPROBE_PATH: /usr/bin/ffprobe
    ports:
      - "${APP_PORT:-8787}:8787"
      - "${APP_DEBUG_PORT:-9229}:9229"
    volumes:
      - ./server:/app/server
      - server-node-modules-dev:/app/server/node_modules
      - app-logs:/app/logs
      - app-storage:/app/server/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8787/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
      - "7000:443"
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./client/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./client/ssl:/etc/nginx/ssl:ro
      - app-storage:/app/server/storage:ro
      - ./client/dist:/usr/share/nginx/html:ro
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wecom_recorder}
      MYSQL_USER: ${MYSQL_USER:-wecom_recorder}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-123456}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: unless-stopped

volumes:
  server-node-modules-dev:
  app-logs:
  app-storage:
  mysql-data:
  redis-data:
