server {
    listen 80;
    server_name tluyin.hyp-arch.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name tluyin.hyp-arch.com;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 512m;

    location ~ ^/api(?:/|$) {
        proxy_pass http://z2d6a895.natappfree.cc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 7200s;
        proxy_send_timeout 7200s;
    }

    # Serve all files from the storage volume shared with the app container.
    # For example: /static/2.txt -> /app/server/storage/2.txt.
    location ^~ /static/ {
        alias /app/server/storage/;
        add_header X-Content-Type-Options "nosniff" always;
        autoindex off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|mjs|map|svg|png|jpg|jpeg|gif|ico|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }
}